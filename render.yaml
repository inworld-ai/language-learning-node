services:
  - type: web
    name: language-learning
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: INWORLD_API_KEY
        sync: false
      - key: STT_PROVIDER
        value: assembly
      - key: ASSEMBLY_AI_API_KEY
        sync: false
      - key: SONIOX_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
